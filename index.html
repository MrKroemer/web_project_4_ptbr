<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./pages/index.css">
  <link rel="stylesheet" href="./normalize.css">
  <script src="./js/script.js" defer></script>
  <title>Around the U.S.</title>
</head>
<body>
  <main class="page">
    <header class="header">
      <img src="./images/logo.png" alt="Around the U.S." class="header__logo">
      <span class="header__line"></span>
    </header>
      <div class="profile">
        <div class="profile__content">
        <img src="./images/FB_IMG.png" alt="imagem de perfil" class="profile__image">
        <div class="profile__description">
          <h2 class="profile__author">Rodents Group</h2>
          <p class="profile__subtitle">Explorar</p>
        </div>
          <img src="./images/Edit-Button.png" class="profile__edit">
        </div>
          <button class="profile__button">&#43;</button>
        </div>   
    <article class="cards">
      <div class="cards__content">
        <img src="./images/yosemite_valley.jpg" alt="lugares" class="cards__image">
        <div class="cards__like-content">
          <h3 class="cards__title">Vale de Yosemit</h3>
          <img src="./images/like.svg" alt="curtir" class="cards__like">
        </div>
      </div>
      <div class="cards__content">
        <img src="./images/louise_lake.png" alt="lugares" class="cards__image">
        <div class="cards__like-content">
          <h3 class="cards__title">Lago Louise</h3>
          <img src="./images/like.svg" alt="curtir" class="cards__like">
        </div>
      </div>
      <div class="cards__content">
        <img src="./images/care_mountains.png" alt="lugares" class="cards__image">
        <div class="cards__like-content">
          <h3 class="cards__title">Montanhas ao pôr do sol</h3>
          <img src="./images/like.svg" alt="curtir" class="cards__like">
        </div>
      </div>
      <div class="cards__content">
        <img src="./images/latemar.png" alt="lugares" class="cards__image">
        <div class="cards__like-content">
          <h3 class="cards__title">Latemar</h3>
          <img src="./images/like.svg" alt="curtir" class="cards__like">
        </div>
      </div>
      <div class="cards__content">
        <img src="./images/national_vanoise.png" alt="lugares" class="cards__image">
        <div class="cards__like-content">
          <h3 class="cards__title">Vanoise National</h3>
          <img src="./images/like.svg" alt="curtir" class="cards__like">
        </div>
      </div>
      <div class="cards__content">
        <img src="./images/braies_lake.png" alt="lugares" class="cards__image">
        <div class="cards__like-content">
          <h3 class="cards__title">Lago di Braies</h3>
          <img src="./images/like.svg" alt="curtir" class="cards__like">
        </div>
      </div>
    </article>
    <footer class="footer">
      <p>&COPY; 2023 Around The U.S.</p>
    </footer>
    <div class="popup popup-edit">
      <div class="popup__container">
        <img src="./images/Close-Icon.png" alt="fechar" class="popup__close">
        <h2 class="popup__title">Editar Perfil</h2>
        <form class="popup__form popup__insert" name="formEditProfile">
          <fieldset class="popup__box">
            <input type="text" name="name" id="name" class="popup__name popup__input_name" placeholder="Nome" required>
            <input type="text" name="about" id="about" class="popup__about popup__input_about" placeholder="Sobre mim" required>
          </fieldset>
          <input type="submit" id="save" name="button" class="popup__button popup__save popup__button_disabled" value="Salvar">
        </form>
      </div>
    </div>
  </main>
</body>
</html>
